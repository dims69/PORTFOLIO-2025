<div class="footer-container" id="contact">

    <p class="contact-label">Need a website, a redesign or a brand identity?</p>

    <h2 class="contact-title">Let's talk</h2>

    <form name="contact-en" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="bot-field">
        <input type="hidden" name="form-name" value="contact-en">

        <div class="form-row">
            <div class="form-group">
                <label for="firstname-en" class="sr-only">First name</label>
                <input type="text" id="firstname-en" name="firstname" placeholder="First name" required>
            </div>
            <div class="form-group">
                <label for="name-en" class="sr-only">Last name</label>
                <input type="text" id="name-en" name="name" placeholder="Last name" required>
            </div>
        </div>
        <div class="form-group">
            <label for="email-en" class="sr-only">Email</label>
            <input type="email" id="email-en" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <label for="message-en" class="sr-only">Message</label>
            <textarea id="message-en" name="message" placeholder="Your message" rows="4" required></textarea>
        </div>

        <button type="submit" class="magnetic-button">
            Send <span class="arrow">&#8599;</span>
        </button>
    </form>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/olivier-pouchoy/" target="_blank">LinkedIn</a>
            <a href="legal.html">Legal notice</a>
        </div>
        <p class="copyright">&copy; <span id="current-year"></span> Olivier Pouchoy. All rights reserved.</p>
    </footer>

</div>
