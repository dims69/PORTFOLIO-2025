<div class="footer-container" id="contact">

    <p class="contact-label">Got a project in mind?</p>

    <h2 class="contact-title">Let's Work<br>Together</h2>

    <form name="contact-en" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="bot-field">
        <input type="hidden" name="form-name" value="contact-en">

        <div class="form-row">
            <div class="form-group">
                <input type="text" name="firstname" placeholder="First name" required>
            </div>
            <div class="form-group">
                <input type="text" name="name" placeholder="Last name" required>
            </div>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <textarea name="message" placeholder="Your message" rows="4" required></textarea>
        </div>

        <button type="submit" class="magnetic-button">
            Send <span class="arrow">&#8599;</span>
        </button>
    </form>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/olivier-pouchoy/" target="_blank">LinkedIn</a>
        </div>
        <p class="copyright">&copy; 2025 Olivier Pouchoy. All rights reserved.</p>
    </footer>

</div>
