<div class="footer-container" id="contact">

    <p class="contact-label">Un projet en tête ?</p>

    <h2 class="contact-title">Travaillons<br>Ensemble</h2>

    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="bot-field">
        <input type="hidden" name="form-name" value="contact">

        <div class="form-row">
            <div class="form-group">
                <input type="text" name="firstname" placeholder="Prénom" required>
            </div>
            <div class="form-group">
                <input type="text" name="name" placeholder="Nom" required>
            </div>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <textarea name="message" placeholder="Votre message" rows="4" required></textarea>
        </div>

        <button type="submit" class="magnetic-button">
            Envoyer <span class="arrow">↗</span>
        </button>
    </form>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/olivier-pouchoy/" target="_blank">LinkedIn</a>
        </div>
        <p class="copyright">© <span id="current-year"></span> Olivier Pouchoy. Tous droits réservés.</p>
    </footer>

</div>
