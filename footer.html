<div class="footer-container" id="contact">

    <p class="contact-label">Besoin d'un site vitrine, d'une refonte ou d'une identité visuelle ?</p>

    <h2 class="contact-title">Parlons-en</h2>

    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="bot-field">
        <input type="hidden" name="form-name" value="contact">

        <div class="form-row">
            <div class="form-group">
                <label for="firstname" class="sr-only">Prénom</label>
                <input type="text" id="firstname" name="firstname" placeholder="Prénom" required>
            </div>
            <div class="form-group">
                <label for="name" class="sr-only">Nom</label>
                <input type="text" id="name" name="name" placeholder="Nom" required>
            </div>
        </div>
        <div class="form-group">
            <label for="email" class="sr-only">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <label for="message" class="sr-only">Message</label>
            <textarea id="message" name="message" placeholder="Votre message" rows="4" required></textarea>
        </div>

        <button type="submit" class="magnetic-button">
            Envoyer <span class="arrow">↗</span>
        </button>
    </form>

    <footer class="main-footer">
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/olivier-pouchoy/" target="_blank">LinkedIn</a>
            <a href="mentions-legales.html">Mentions légales</a>
        </div>
        <p class="copyright">© <span id="current-year"></span> Olivier Pouchoy. Tous droits réservés.</p>
    </footer>

</div>
